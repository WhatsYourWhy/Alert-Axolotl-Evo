evolution:
  seed: 42
  pop_size: 50
  generations: 40
  min_depth: 2
  max_depth: 7
  elite_ratio: 0.1

operators:
  crossover_rate: 0.9
  mutation_rate: 0.2
  tournament_size: 4

fitness:
  beta: 0.5
  bloat_penalty: 0.005
  fp_threshold: 40
  fp_penalty: 5.0

data:
  data_source: mock  # "mock", "csv", or "json"
  data_path: null  # Path to data file (for csv/json)
  value_column: value  # Column/key name for values
  timestamp_column: timestamp  # Column/key name for timestamps
  anomaly_column: null  # Column/key name for anomaly labels (optional)
  mock_size: 1000  # Increased for more realistic dataset
  anomaly_count: 50  # ~5% anomaly rate
  anomaly_multiplier: 1.8  # Reduced for harder detection
  consistent_data: true  # Use same data across all generations (recommended)
  use_realistic_patterns: true  # Enable trends, noise, realistic anomalies
  base_latency_mean: 50.0
  base_latency_std: 10.0
  trend_strength: 0.1  # Strength of gradual trends (0-1)
  noise_level: 0.15  # Additional noise level (0-1)

